<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GRACE AI — 어른의 품격</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2B2A33; --ink-soft:#736C72; --paper:#FBF7F1; --backdrop:#E9E2D6; --line:#E1D6C6;
  --gold:#B6925B; --gold-deep:#8E7240; --gold-bg:#F4E9D6;
  --navy:#22395C; --navy-soft:#E3E8EF;
  --rose:#9C5E78; --rose-soft:#F1E1E8;
  --good:#4C7A5E; --good-soft:#E6F2EB;
  --danger:#B04040;
  --radius-card:18px; --radius-btn:16px;
  --shadow:0 18px 40px -16px rgba(43,42,51,0.28);
  --shadow-sm:0 4px 16px -6px rgba(43,42,51,0.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{font-size:17px;}
body{
  margin:0; min-height:100vh;
  background:var(--backdrop);
  background-image:radial-gradient(circle at 18% 12%,rgba(182,146,91,.10),transparent 45%),
                   radial-gradient(circle at 84% 86%,rgba(34,57,92,.08),transparent 45%);
  font-family:'Noto Sans KR',sans-serif; color:var(--ink);
  display:flex; align-items:center; justify-content:center; padding:28px 12px;
}
.serif{font-family:'Noto Serif KR',serif;}

/* ── Device shell ── */
.device{
  width:100%; max-width:402px; height:min(844px,94vh);
  background:var(--paper); border-radius:34px;
  box-shadow:var(--shadow); border:1px solid rgba(43,42,51,.06);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
@media(max-width:440px){
  body{padding:0;}
  .device{height:100vh;max-width:100%;border-radius:0;box-shadow:none;border:none;}
}

/* ── Topbar ── */
.topbar{
  flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  padding:18px 18px 8px; min-height:34px; z-index:10;
}
.icon-btn{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
  background:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink);flex-shrink:0;
}
.icon-btn svg{width:20px;height:20px;}
.icon-btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
.icon-btn.hidden{visibility:hidden;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .25s,transform .25s;}
.dot.active{background:var(--gold);transform:scale(1.3);}
.brandmini{font-size:.78rem;letter-spacing:.14em;font-weight:700;color:var(--gold-deep);}
.brandmini.hidden{visibility:hidden;}

/* ── Zones (diagnosis phase) ── */
.visual-zone{flex:0 0 38%;display:flex;align-items:center;justify-content:center;padding:6px 24px;overflow:hidden;}
.content-zone{flex:1 1 auto;overflow-y:auto;padding:6px 26px 14px;-webkit-overflow-scrolling:touch;}
.action-bar{flex:0 0 auto;padding:14px 22px 22px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--line);background:linear-gradient(180deg,rgba(251,247,241,.4),var(--paper) 35%);}

/* ── Tab layout (main phase) ── */
.main-body{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;}
.tab-content{flex:1 1 auto;overflow-y:auto;padding:16px 22px 80px;-webkit-overflow-scrolling:touch;}
.bottom-nav{
  flex:0 0 auto;display:flex;align-items:stretch;
  border-top:1px solid var(--line);background:var(--paper);padding:0;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px 14px;cursor:pointer;border:none;background:transparent;
  color:var(--ink-soft);font-family:'Noto Sans KR',sans-serif;font-size:.72rem;font-weight:500;
  position:relative;transition:color .15s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.nav-tab svg{width:22px;height:22px;transition:color .15s;}
.nav-tab.active{color:var(--gold-deep);}
.nav-tab.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--gold);border-radius:0 0 3px 3px;}
.nav-tab.active-navy{color:var(--navy);}
.nav-tab.active-navy::after{background:var(--navy);}
.nav-tab.active-rose{color:var(--rose);}
.nav-tab.active-rose::after{background:var(--rose);}

/* ── Typography ── */
.eyebrow{font-size:.82rem;font-weight:700;letter-spacing:.08em;color:var(--ink-soft);margin:2px 0 8px;}
h1.title{font-family:'Noto Serif KR',serif;font-size:1.46rem;line-height:1.35;font-weight:700;margin:0 0 8px;}
p.desc{font-size:.96rem;line-height:1.6;color:var(--ink-soft);margin:0 0 18px;}
.section-title{font-size:1.06rem;font-weight:700;margin:18px 0 10px;font-family:'Noto Serif KR',serif;}

/* ── Buttons ── */
.btn{
  appearance:none;border:none;border-radius:var(--radius-btn);min-height:58px;padding:0 20px;
  font-family:'Noto Sans KR',sans-serif;font-size:1.02rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  transition:transform .12s,opacity .2s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
}
.btn:active{transform:scale(.98);}
.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary.tone-navy{background:var(--navy);}
.btn-primary.tone-rose{background:var(--rose);}
.btn-primary.tone-gold{background:var(--gold);}
.btn-primary:disabled{background:#D9D2C4;color:#A39E91;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--ink-soft);font-weight:500;min-height:44px;}
.btn-sm{min-height:44px;font-size:.9rem;border-radius:12px;padding:0 16px;}

/* ── Option cards ── */
.option-stack{display:flex;flex-direction:column;gap:12px;margin-bottom:8px;}
.option-card{
  border:1.5px solid var(--line);background:#fff;border-radius:var(--radius-card);
  padding:16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;text-align:left;width:100%;
  transition:border-color .15s,background .15s,transform .1s;
  font-family:'Noto Sans KR',sans-serif;
}
.option-card:active{transform:scale(.99);}
.option-card .oc-icon{flex:0 0 auto;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--navy-soft);color:var(--navy);}
.option-card.rose .oc-icon{background:var(--rose-soft);color:var(--rose);}
.option-card .oc-icon svg{width:22px;height:22px;}
.option-card .oc-label{font-size:1rem;font-weight:700;color:var(--ink);margin:0 0 2px;}
.option-card .oc-sub{font-size:.84rem;color:var(--ink-soft);margin:0;line-height:1.45;}
.option-card.selected{border-color:var(--gold);background:#FFFBF3;}
.option-card.selected.tone-navy{border-color:var(--navy);}
.option-card.selected.tone-rose{border-color:var(--rose);}
.check-mark{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;}
.option-card.selected .check-mark{background:var(--gold);border-color:var(--gold);}
.option-card.selected.tone-navy .check-mark{background:var(--navy);border-color:var(--navy);}
.option-card.selected.tone-rose .check-mark{background:var(--rose);border-color:var(--rose);}
.check-mark svg{width:14px;height:14px;color:#fff;visibility:hidden;}
.option-card.selected .check-mark svg{visibility:visible;}

/* ── Splash ── */
.splash-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 30px;}
.splash-mark{font-family:'Noto Serif KR',serif;font-size:2.2rem;font-weight:700;letter-spacing:.04em;}
.splash-mark span{color:var(--gold);}
.splash-sub{font-size:1.04rem;color:var(--ink-soft);margin:10px 0 0;line-height:1.6;}
.splash-tagline{margin-top:28px;font-size:.86rem;letter-spacing:.05em;color:var(--gold-deep);font-weight:700;}

/* ── Dial ── */
.dial-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dial-caption{font-size:.84rem;color:var(--ink-soft);font-weight:700;text-align:center;}

/* ── Scan/ring ── */
.ring-wrap{position:relative;width:128px;height:128px;display:flex;align-items:center;justify-content:center;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-pct{position:absolute;font-weight:900;font-size:1.3rem;color:var(--ink);}
.scan-box{position:absolute;border:2px solid var(--gold);border-radius:6px;opacity:0;animation:scanblink 2.4s ease-in-out infinite;}
@keyframes scanblink{0%,100%{opacity:0;}18%{opacity:1;}38%{opacity:0;}}

/* ── Result cards ── */
.result-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-card);padding:16px;margin-bottom:14px;}
.result-card h3{margin:0 0 6px;font-size:1rem;font-family:'Noto Serif KR',serif;}
.result-card p{margin:0;font-size:.9rem;line-height:1.55;color:var(--ink-soft);}
.swatch-row{display:flex;gap:8px;margin-top:12px;}
.swatch{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.08);}

/* ── Chips ── */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{border-radius:999px;padding:7px 13px;font-size:.8rem;font-weight:700;background:var(--navy-soft);color:var(--navy);}
.chip.rose{background:var(--rose-soft);color:var(--rose);}
.chip.gold{background:var(--gold-bg);color:var(--gold-deep);}

/* ── Coaching ── */
.coach-card{
  display:flex;align-items:flex-start;gap:12px;
  background:#fff;border:1.5px solid var(--line);border-radius:var(--radius-card);
  padding:15px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,background .15s;
  text-align:left;width:100%;font-family:'Noto Sans KR',sans-serif;
}
.coach-card.done{border-color:var(--good);background:var(--good-soft);}
.coach-box{flex:0 0 auto;width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;margin-top:2px;}
.coach-card.done .coach-box{background:var(--good);border-color:var(--good);}
.coach-box svg{width:15px;height:15px;color:#fff;visibility:hidden;}
.coach-card.done .coach-box svg{visibility:visible;}
.coach-title{font-weight:700;font-size:.96rem;margin:0 0 3px;}
.coach-desc{font-size:.84rem;color:var(--ink-soft);line-height:1.5;margin:0;}
.coach-tag{display:inline-block;margin-top:6px;font-size:.74rem;font-weight:700;color:var(--gold-deep);background:var(--gold-bg);border-radius:8px;padding:2px 8px;}

/* ── Report ── */
.report-card{background:linear-gradient(160deg,#fff,#FBF4E8);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:16px;}
.report-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:.9rem;}
.report-row:last-child{border-bottom:none;}
.report-row span:first-child{color:var(--ink-soft);}
.report-row span:last-child{font-weight:700;}
.report-msg{font-family:'Noto Serif KR',serif;font-size:1.06rem;line-height:1.6;text-align:center;margin:6px 0 18px;}
.note-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:.84rem;color:var(--ink-soft);line-height:1.55;display:flex;gap:10px;align-items:flex-start;}
.note-card svg{flex:0 0 auto;width:18px;height:18px;color:var(--gold-deep);margin-top:1px;}

/* ── Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.chat-messages{flex:1 1 auto;overflow-y:auto;padding:8px 4px 4px;display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;gap:10px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{
  flex:0 0 auto;width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif KR',serif;font-size:.78rem;font-weight:700;color:#fff;
  box-shadow:0 2px 8px rgba(182,146,91,.4);
}
.msg-bubble{
  max-width:76%;padding:13px 15px;border-radius:18px 18px 18px 4px;
  background:#fff;border:1px solid var(--line);
  font-size:.95rem;line-height:1.6;color:var(--ink);
}
.msg-row.user .msg-bubble{
  border-radius:18px 18px 4px 18px;
  background:var(--navy);color:#fff;border:none;
}
.msg-row.user.rose .msg-bubble{background:var(--rose);}
.msg-time{font-size:.68rem;color:var(--ink-soft);margin-top:4px;align-self:flex-end;}
.msg-row.user .msg-time{text-align:right;}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:12px 15px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);animation:typingpulse 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingpulse{0%,80%,100%{transform:scale(1);opacity:.5;}40%{transform:scale(1.3);opacity:1;}}

/* Quick replies */
.quick-row{display:flex;gap:8px;flex-wrap:wrap;padding:6px 0 2px;}
.quick-chip{
  border:1.5px solid var(--gold);background:#fff;border-radius:999px;
  padding:8px 14px;font-size:.86rem;font-weight:700;color:var(--gold-deep);
  cursor:pointer;transition:background .12s,color .12s;
  font-family:'Noto Sans KR',sans-serif;
}
.quick-chip:active{background:var(--gold);color:#fff;}
.quick-chip.navy-style{border-color:var(--navy);color:var(--navy);}
.quick-chip.navy-style:active{background:var(--navy);color:#fff;}
.quick-chip.rose-style{border-color:var(--rose);color:var(--rose);}
.quick-chip.rose-style:active{background:var(--rose);color:#fff;}

/* Chat input */
.chat-input-bar{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;
  padding:10px 14px 16px;border-top:1px solid var(--line);
  background:var(--paper);
}
.chat-input-wrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:#fff;border:1.5px solid var(--line);border-radius:24px;
  padding:6px 6px 6px 14px;min-height:48px;
  transition:border-color .15s;
}
.chat-input-wrap:focus-within{border-color:var(--gold);}
.chat-input-wrap.listening{border-color:var(--danger);}
#chatInput{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Noto Sans KR',sans-serif;font-size:.96rem;color:var(--ink);
  resize:none;min-height:24px;max-height:96px;overflow-y:auto;line-height:1.5;
}
#chatInput::placeholder{color:#C4B9AE;}
.voice-btn{
  flex:0 0 auto;width:38px;height:38px;border-radius:50%;border:none;
  background:var(--gold-bg);color:var(--gold-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s,transform .1s;
}
.voice-btn:active{transform:scale(.92);}
.voice-btn.listening{background:var(--danger);color:#fff;animation:pulse-ring .8s ease infinite;}
.voice-btn svg{width:18px;height:18px;}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(176,64,64,.4);}70%{box-shadow:0 0 0 10px rgba(176,64,64,0);}100%{box-shadow:0 0 0 0 rgba(176,64,64,0);}}
.send-btn{
  flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;
  background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,transform .12s;
}
.send-btn.tone-navy{background:var(--navy);}
.send-btn.tone-rose{background:var(--rose);}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{background:#D9D2C4;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;}

/* STT badge */
.stt-badge{
  display:none;align-items:center;gap:6px;
  background:#fff;border:1px solid var(--danger);border-radius:10px;
  padding:6px 12px;font-size:.8rem;font-weight:700;color:var(--danger);
  position:absolute;bottom:76px;left:50%;transform:translateX(-50%);
  white-space:nowrap;box-shadow:var(--shadow-sm);
}
.stt-badge.show{display:flex;}
.stt-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:typingpulse .8s infinite;}

/* Misc */
.fade-in{animation:fadein .32s ease both;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.skip-link{text-align:center;font-size:.84rem;color:var(--ink-soft);text-decoration:underline;cursor:pointer;margin-top:14px;background:none;border:none;}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:0 24px;gap:10px;}
.chat-empty-icon{font-size:2.4rem;}
.chat-empty-title{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:700;}
.chat-empty-sub{font-size:.88rem;color:var(--ink-soft);line-height:1.55;}
/* Chat category tabs */
.chat-cats{display:flex;gap:6px;overflow-x:auto;padding:8px 0 4px;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0;}
.chat-cats::-webkit-scrollbar{display:none;}
.cat-tab{flex:0 0 auto;border-radius:999px;padding:7px 14px;font-size:.78rem;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .12s,color .12s,border-color .12s;}
.cat-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.cat-tab.active-navy{background:var(--navy);color:#fff;border-color:var(--navy);}
.cat-tab.active-rose{background:var(--rose);color:#fff;border-color:var(--rose);}

/* Message share button */
.msg-share-btn{
  display:inline-flex;align-items:center;gap:4px;margin-top:8px;
  border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:4px 10px;font-size:.72rem;font-weight:700;color:var(--ink-soft);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:background .12s,color .12s;
}
.msg-share-btn:active{background:var(--gold-bg);color:var(--gold-deep);}
.msg-share-btn svg{width:12px;height:12px;}

/* ── 공유 바텀시트 ── */
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;display:flex;align-items:flex-end;justify-content:center;animation:fadeInOverlay .2s ease;}
@keyframes fadeInOverlay{from{opacity:0;}to{opacity:1;}}
.share-sheet{background:#fff;border-radius:28px 28px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);width:100%;max-width:402px;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUpSheet .28s cubic-bezier(.22,1,.36,1);}
@keyframes slideUpSheet{from{transform:translateY(100%);}to{transform:translateY(0);}}
.share-sheet-handle{width:40px;height:4px;background:#E1D6C6;border-radius:999px;margin:14px auto 0;}
.share-preview{width:calc(100% - 40px);margin:14px 20px 0;border-radius:14px;overflow:hidden;max-height:180px;object-fit:cover;display:block;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.share-title{font-family:'Noto Serif KR',serif;font-size:1.06rem;font-weight:700;text-align:center;padding:14px 20px 6px;}
.share-desc{font-size:.82rem;color:var(--ink-soft);text-align:center;padding:0 24px 12px;line-height:1.5;}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 8px;}
.share-btn-item{display:flex;flex-direction:column;align-items:center;gap:6px;border:1.5px solid var(--line);border-radius:16px;padding:14px 8px;cursor:pointer;background:#fff;font-family:'Noto Sans KR',sans-serif;transition:background .12s,transform .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.share-btn-item:active{transform:scale(.96);background:#F8F5F0;}
.share-btn-item .sb-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:2px;}
.share-btn-item .sb-label{font-size:.8rem;font-weight:700;color:var(--ink);}
.share-btn-item .sb-sub{font-size:.68rem;color:var(--ink-soft);}
.share-full-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 20px 10px;min-height:50px;border-radius:14px;font-size:.96rem;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s,transform .1s;}
.share-full-btn:active{transform:scale(.98);opacity:.85;}
.share-close-btn{width:calc(100% - 40px);margin:0 20px 16px;min-height:48px;border-radius:14px;border:1.5px solid var(--line);background:#fff;font-size:.96rem;font-weight:500;color:var(--ink-soft);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
</style>
</head>
<body>
<div class="device" id="device">
  <!-- Topbar -->
  <div class="topbar" id="topbar">

function actionsFor(step){

  if(step==='gender')return '<button class="btn btn-primary'+tc+'" '+(state.gender?'':'disabled')+' onclick="GraceApp.goNext()">다음</button>';
  if(step==='body')return '<button class="btn btn-primary'+tc+'" '+(state.bodyKey?'':'disabled')+' onclick="GraceApp.goNext()">다음</button>';

  return '';
}

/* 카테고리 탭 전환 */
/* 챗봇 메시지 개별 공유 */
/* 채팅 메시지 전용 공유 카드 */
/* ── 리포트 점수 계산 ── */
function calcScores(){
  var done=Object.keys(state.coachDone).filter(function(k){return state.coachDone[k];}).length;
  var chatCount=Math.floor(state.chatHistory.length/2);
  var bodyScore = state.bodyKey ? 25 : 0;
  var colorScore = state.season ? 25 : 0;
  var coachScore = Math.round((done/COACH.length)*30);
  var chatScore  = Math.min(chatCount*5, 20);
  return {
    total: bodyScore+colorScore+coachScore+chatScore,
    body: bodyScore, color: colorScore,
    coach: coachScore, chat: chatScore,
    done: done, chatCount: chatCount
  };
}

/* ── 원형 스코어 SVG ── */
function scoreSVG(score, color){
  var r=36, c=44, circ=2*Math.PI*r;
  var offset=circ*(1-score/100);
  return '<svg width="88" height="88" viewBox="0 0 88 88">'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#E9E2D6" stroke-width="7"/>'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7"'+
      ' stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"'+
      ' transform="rotate(-90 '+c+' '+c+')" style="transition:stroke-dashoffset 1s ease"/>'+
    '<text x="'+c+'" y="'+(c+5)+'" text-anchor="middle" font-size="16" font-weight="900" fill="#2B2A33" font-family="sans-serif">'+score+'</text>'+
  '</svg>';
}

function roundRect(ctx2,x,y,w,h,r){
  ctx2.beginPath();
  ctx2.moveTo(x+r,y);
  ctx2.lineTo(x+w-r,y);
  ctx2.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx2.lineTo(x+w,y+h-r);
  ctx2.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx2.lineTo(x+r,y+h);
  ctx2.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx2.lineTo(x,y+r);
  ctx2.quadraticCurveTo(x,y,x+r,y);
  ctx2.closePath();
}



function wrapText(ctx2,text,x,y,maxW,lineH){
  if(!text) return;
  var words=text.split(' '), line='';
  for(var i=0;i<words.length;i++){
    var test=line+words[i]+' ';
    if(ctx2.measureText(test).width>maxW&&i>0){
      ctx2.fillText(line,x,y); line=words[i]+' '; y+=lineH;
    } else { line=test; }
  }
  ctx2.fillText(line,x,y);
}



function getSeasonPalette(){
  var map={
    spring:{from:'#E8896A',to:'#C96E45',text:'#fff'},
    summer:{from:'#8097BC',to:'#5C6F94',text:'#fff'},
    autumn:{from:'#A0622A',to:'#6E3F14',text:'#fff'},
    winter:{from:'#2F4566',to:'#1A2840',text:'#fff'}
  };
  return map[state.season]||{from:'#22395C',to:'#0E1E33',text:'#fff'};
}



function getGradeLabel(){
  var sc=calcScores();
  if(sc.total>=80) return 'Signature Grace';
  if(sc.total>=60) return 'Rising Grace';
  if(sc.total>=40) return 'Awakening Grace';
  return 'First Grace';
}



function generateChatCard(question, answer){
  return new Promise(function(resolve){
    var W=900, H=700;
    var cv=document.createElement('canvas');
    cv.width=W; cv.height=H;
    var g=cv.getContext('2d');
    var pal=getSeasonPalette();
    var isMale=state.gender==='male';

    /* 배경 */
    var bg=g.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,pal.from); bg.addColorStop(1,pal.to);
    g.fillStyle=bg; roundRect(g,0,0,W,H,0); g.fill();

    /* 반투명 장식 */
    g.globalAlpha=0.07; g.fillStyle='#fff';
    g.beginPath(); g.arc(W-80,80,180,0,Math.PI*2); g.fill();
    g.globalAlpha=1;

    /* 헤더 */
    g.fillStyle='rgba(255,255,255,0.18)';
    roundRect(g,0,0,W,80,0); g.fill();
    g.fillStyle='#fff'; g.font='bold 24px sans-serif';
    g.fillText('GRACE AI  ·  코칭 상담 내용', 36, 50);
    g.fillStyle='rgba(255,255,255,0.65)'; g.font='400 16px sans-serif';
    g.fillText((isMale?'남성 · 신뢰와 성공':'여성 · 우아함과 자아 일치')+' · '+ctx.dateStr, 36, 72);

    /* Q 버블 (우측) */
    if(question){
      g.fillStyle='rgba(255,255,255,0.22)';
      roundRect(g,W/2,110,W/2-40,72,14); g.fill();
      g.fillStyle='#fff'; g.font='bold 15px sans-serif';
      g.fillText('Q', W/2+16, 138);
      g.font='400 15px sans-serif';
      wrapText(g, question, W/2+38, 138, W/2-90, 22);
    }

    /* A 카드 (흰색) */
    var ay=question?204:110;
    g.fillStyle='rgba(255,255,255,0.96)';
    roundRect(g,36,ay,W-72,H-ay-60,18); g.fill();

    /* G 아바타 */
    var grad=g.createLinearGradient(60,ay+24,96,ay+60);
    grad.addColorStop(0,pal.from); grad.addColorStop(1,pal.to);
    g.fillStyle=grad;
    g.beginPath(); g.arc(78,ay+42,28,0,Math.PI*2); g.fill();
    g.fillStyle='#fff'; g.font='bold 20px serif';
    g.textAlign='center'; g.fillText('G',78,ay+49); g.textAlign='left';

    g.fillStyle='#2B2A33'; g.font='bold 16px sans-serif';
    g.fillText('Grace AI 코칭', 116, ay+34);
    g.fillStyle='#736C72'; g.font='400 13px sans-serif';
    g.fillText(ctx.timeStr+' · '+ctx.calSeason, 116, ay+54);

    /* 구분선 */
    g.strokeStyle='#E1D6C6'; g.lineWidth=1;
    g.beginPath(); g.moveTo(56,ay+76); g.lineTo(W-56,ay+76); g.stroke();

    /* 답변 텍스트 */
    g.fillStyle='#2B2A33'; g.font='400 17px sans-serif';
    var maxLines=Math.floor((H-ay-150)/26);
    var shortAnswer=answer.length>280?answer.substring(0,280)+'…':answer;
    wrapText(g, shortAnswer, 56, ay+104, W-112, 26);

    /* 하단 해시태그 */
    g.fillStyle='rgba(255,255,255,0.85)';
    roundRect(g,0,H-56,W,56,0); g.fill();
    g.fillStyle=pal.from; g.font='bold 15px sans-serif';
    g.textAlign='center';
    g.fillText('#GraceAI  #이미지코칭  #퍼스널스타일  #4050품격', W/2, H-24);
    g.textAlign='left';

    resolve({dataUrl:cv.toDataURL('image/png'), name:'grace-ai-chat.png'});
  });
}

/* ═══════════════════ CLAUDE API ═══════════════════ */
function buildSystemPrompt(){
  var bd=bodyData(); var s=seasonData();
  var gl=state.gender==='male'?'남성':'여성';
  var specific=state.gender==='male'
    ?'전문직 고정관념 활용: 직업 특성에 맞는 안경 테, 넥타이 컬러를 YOLO 데이터와 매칭하여 전략적으로 제안하세요. 메러비안 법칙(55% 외모, 38% 발성, 7% 언어) 기반 통합 코칭을 제공하세요.'
    :'4가지 스타일링 불일치(입고 싶은 것 vs 어울리는 것 등) 해소에 집중하세요. 자아일치성(Self-Congruence) 코칭으로 이상적 자아와 실제 자아의 간극을 줄여주세요.';
  return 'Grace AI의 품격 있는 라이프스타일 큐레이터입니다.\n\n현재 상황:\n- '+ctxSummary()+'\n\n사용자 프로필:\n- 성별: '+gl+'\n- 체형/골격: '+(bd.label||'미진단')+' — '+(bd.desc||'')+'\n- 퍼스널 컬러: '+(s.label||'미진단')+' ('+s.tone+')\n- AI 추천 스타일: '+(bd.outfit||'')+'\n\n상담 원칙:\n1. 자아일치성 코칭: 실제 이미지와 이상적 이미지 간극을 줄여주세요.\n2. 비언어 트레이닝 연계: 의상 추천 후 발성·미소·자세 훈련을 함께 안내하세요.\n3. '+specific+'\n4. 오늘의 날씨·계절·시간대('+ctxSummary()+')를 반영한 TPO 코디를 제안하세요.\n5. 이미지 메이킹 5계명(표정, 자세, 발성, 의상, 내면)을 통합적으로 적용하세요.\n\n말투: 따뜻하고 전문적인 코치. 존댓말. 2-4문장 내외로 간결하게. 한국어만 사용.';
}
async function callClaude(userMsg){
  // sendMessage가 chatHistory에 userMsg push 후 호출
  // -> chatHistory 그대로 사용 (중복 push 금지)
  var msgs=state.chatHistory
    .filter(function(m){ return m.role==='user'||m.role==='assistant'; })
    .filter(function(m){
      return m.content &&
             m.content!=='잠시 연결이 원활하지 않아요. 다시 시도해 주세요.' &&
             m.content!=='죄송해요, 응답을 받지 못했어요. 다시 질문해 주세요.';
    })
    .map(function(m){ return {role:m.role,content:m.content}; });

  // user/assistant 교대 보장 (API 요건)
  var cleaned=[];
  msgs.forEach(function(m){
    if(!cleaned.length || cleaned[cleaned.length-1].role!==m.role) cleaned.push(m);
  });
  if(!cleaned.length || cleaned[cleaned.length-1].role!=='user') return null;

  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      system:buildSystemPrompt(),
      messages:cleaned
    })
  });
  if(!res.ok){
    var errBody=await res.text().catch(function(){return '';});
    throw new Error('HTTP '+res.status+' '+errBody.substring(0,120));
  }
  var data=await res.json();
  if(data.content&&data.content[0]&&data.content[0].text) return data.content[0].text;
  throw new Error('빈 응답: '+JSON.stringify(data).substring(0,80));
}

/* ═══════════════════ STT ═══════════════════ */
var recognition=null;
function initSTT(){
  var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec)return;
  recognition=new SpeechRec();
  recognition.lang='ko-KR'; recognition.continuous=false; recognition.interimResults=true;
  recognition.onresult=function(e){
    var transcript='';
    for(var i=e.resultIndex;i<e.results.length;i++)transcript+=e.results[i][0].transcript;
    var inp=document.getElementById('chatInput');
    if(inp)inp.value=transcript;
    if(e.results[e.results.length-1].isFinal){stopSTT();sendMessage();}
  };
  recognition.onerror=function(){stopSTT();};
  recognition.onend=function(){if(state.sttActive)stopSTT();};
}
function startSTT(){
  if(!recognition){var inp=document.getElementById('chatInput');if(inp)inp.focus();return;}
  state.sttActive=true;
  var vb=document.getElementById('voiceBtn'); if(vb)vb.classList.add('listening');
  var wrap=document.getElementById('chatInputWrap'); if(wrap)wrap.classList.add('listening');
  var badge=document.getElementById('sttBadge'); if(badge)badge.classList.add('show');
  recognition.start();
}
function stopSTT(){
  state.sttActive=false;
  if(recognition)try{recognition.stop();}catch(e){}
  var vb=document.getElementById('voiceBtn'); if(vb)vb.classList.remove('listening');
  var wrap=document.getElementById('chatInputWrap'); if(wrap)wrap.classList.remove('listening');
  var badge=document.getElementById('sttBadge'); if(badge)badge.classList.remove('show');
}

/* ═══════════════════ CHAT ACTIONS ═══════════════════ */
function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function sendMessage(text){
  var inp=document.getElementById('chatInput');
  var msg=(text||(inp&&inp.value)||'').trim();
  if(!msg||state.isTyping) return;
  if(inp){ inp.value=''; inp.style.height='auto'; }
  // 직전 에러 메시지는 제거 후 재시도
  if(state.chatHistory.length){
    var last=state.chatHistory[state.chatHistory.length-1];
    if(last.role==='assistant'&&(
      last.content==='잠시 연결이 원활하지 않아요. 다시 시도해 주세요.'||
      last.content==='죄송해요, 응답을 받지 못했어요. 다시 질문해 주세요.'
    )) state.chatHistory.pop();
  }
  state.chatHistory.push({role:'user',content:msg});
  state.isTyping=true;
  renderMain(); scrollChat();
  try{
    var reply=await callClaude(msg);
    if(reply){
      state.chatHistory.push({role:'assistant',content:reply});
    } else {
      state.chatHistory.pop();
      state.chatHistory.push({role:'assistant',content:'죄송해요, 응답을 받지 못했어요. 다시 질문해 주세요.'});
    }
  } catch(e){
    console.error('[Grace AI]',e.message);
    state.chatHistory.push({role:'assistant',content:'잠시 연결이 원활하지 않아요. 다시 시도해 주세요.'});
  }
  state.isTyping=false; state.quickSet++;
  renderMain(); scrollChat();
}
function sendQuick(q){sendMessage(q);}

  setTimeout(function(){var el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},60);
}

/* ═══════════════════ NAVIGATION ═══════════════════ */
function goNext(){
  clearTimers();
  var step=DIAG_STEPS[state.stepIndex];
  if(state.stepIndex<DIAG_STEPS.length-1){
    state.stepIndex++;
    renderDiag();
    if(DIAG_STEPS[state.stepIndex]==='analyzing')startAnalyzing();
  } else {
    enterMain();
  }
}
function goBack(){
  clearTimers();
  var step=DIAG_STEPS[state.stepIndex];
  if(step==='color'&&state.colorStep>0){state.colorStep--;renderDiag();return;}
  if(state.stepIndex>0){
    state.stepIndex--;
    if(DIAG_STEPS[state.stepIndex]==='analyzing')state.stepIndex--;
    renderDiag();
  }
}
function enterMain(){
  state.phase='main'; state.tab='result';
  document.getElementById('diagPhase').style.display='none';
  document.getElementById('mainPhase').style.display='flex';
  renderMain(); updateNav();
}
function switchTab(tab){
  state.tab=tab; renderMain(); updateNav();
  var tc=document.getElementById('tabContent'); if(tc)tc.scrollTop=0;
}
function toggleCoach(id){state.coachDone[id]=!state.coachDone[id];renderMain();}
function selectGender(g){state.gender=g;renderDiag();}
function selectBody(k){state.bodyKey=k;renderDiag();}
function answerColor(field,val){
  if(field==='warmCool'){state.warmCool=val;state.colorStep=1;}
  else{state.brightSoft=val;var wc=state.warmCool,bs=val;state.season=wc==='warm'&&bs==='bright'?'spring':wc==='warm'&&bs==='soft'?'autumn':wc==='cool'&&bs==='bright'?'winter':'summer';state.colorStep=2;}
  renderDiag();
}
function restart(){
  clearTimers(); stopSTT(); closeShareSheet();
  state={phase:'diagnosis',stepIndex:0,gender:null,bodyKey:null,colorStep:0,warmCool:null,brightSoft:null,season:null,coachDone:{},tab:'result',chatHistory:[],isTyping:false,quickSet:0,sttActive:false};
  document.getElementById('mainPhase').style.display='none';
  document.getElementById('diagPhase').style.display='flex';
  renderDiag();
}

/* ═══════════════════ ANALYZING ANIMATION ═══════════════════ */
function startAnalyzing(){
  var caps=['체형 데이터를 분석하고 있어요','YOLO 2단계 라벨링을 진행해요','최적의 코디를 매칭하고 있어요'];
  var ci=0;
  var t1=setInterval(function(){ci=(ci+1)%caps.length;var el=document.getElementById('analyzeCaption');if(el)el.textContent=caps[ci];},950);timers.push(t1);
  var ring=document.getElementById('ringProgress'),pctEl=document.getElementById('ringPct'),pct=0;
  var t2=setInterval(function(){pct+=4;if(pct>100)pct=100;if(ring)ring.setAttribute('stroke-dashoffset',339-(339*pct/100));if(pctEl)pctEl.textContent=pct+'%';if(pct>=100){clearInterval(t2);var t3=setTimeout(function(){enterMain();},400);timers.push(t3);}},100);timers.push(t2);
  var skip=document.getElementById('skipBtn');if(skip)skip.addEventListener('click',function(){clearTimers();enterMain();});
}

/* ═══════════════════ RENDERS ═══════════════════ */
function renderDiag(){
  var step=DIAG_STEPS[state.stepIndex];
  document.getElementById('visualZone').innerHTML=visualFor(step);
  var cz=document.getElementById('contentZone');
  cz.innerHTML=contentFor(step);
  cz.classList.remove('fade-in');void cz.offsetWidth;cz.classList.add('fade-in');
  document.getElementById('actionBar').innerHTML=actionsFor(step);
  // topbar
  var back=document.getElementById('backBtn');
  var canBack=state.stepIndex>0&&step!=='analyzing';
  back.classList.toggle('hidden',!canBack);
  document.getElementById('brandMini').classList.toggle('hidden',step==='splash');
  var dots=document.getElementById('dots');
  var showSteps=['gender','body','color'];
  if(showSteps.indexOf(step)>-1){dots.innerHTML=showSteps.map(function(s){return'<span class="dot'+(s===step?' active':'')+'"></span>';}).join('');}
  else dots.innerHTML='';
}
function renderMain(){
  var content='';
  if(state.tab==='result')content=renderResult();
  else if(state.tab==='coaching')content=renderCoaching();
  else if(state.tab==='chatbot')content=renderChatbot();
  else if(state.tab==='report')content=renderReport();
  var tc=document.getElementById('tabContent');
  if(tc){tc.innerHTML=content;tc.classList.remove('fade-in');void tc.offsetWidth;tc.classList.add('fade-in');}
  // chat input bar
  var bar=document.getElementById('chatInputBar');
  if(bar)bar.style.display=state.tab==='chatbot'?'block':'none';
  // topbar (main phase)
  document.getElementById('backBtn').classList.add('hidden');
  document.getElementById('brandMini').classList.remove('hidden');
  document.getElementById('dots').innerHTML='';
  if(state.tab==='chatbot')scrollChat();
  bindChatInput();
}
function updateNav(){
  var tone=accentTone();
  document.querySelectorAll('.nav-tab').forEach(function(btn){
    var t=btn.dataset.tab;
    btn.classList.remove('active','active-navy','active-rose');
    if(t===state.tab){
      if(tone==='navy')btn.classList.add('active-navy');
      else if(tone==='rose')btn.classList.add('active-rose');
      else btn.classList.add('active');
    }
  });
}
function bindChatInput(){
  var inp=document.getElementById('chatInput');
  var send=document.getElementById('sendBtn');
  var vBtn=document.getElementById('voiceBtn');
  if(inp&&!inp._bound){
    inp._bound=true;
    inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px';});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  }
  if(send&&!send._bound){send._bound=true;send.addEventListener('click',function(){sendMessage();});}
  if(vBtn&&!vBtn._bound){vBtn._bound=true;vBtn.addEventListener('click',function(){if(state.sttActive)stopSTT();else startSTT();});}
  if(send){
    var tone=accentTone();
    send.className='send-btn'+(tone?' tone-'+tone:'');
  }
}

/* ═══════════════════ DATE · TIME · WEATHER CONTEXT ═══════════════════ */
var ctx = {
  dateStr:'', timeStr:'', timePeriod:'', calSeason:'',
  weatherDesc:'', weatherTemp:'', weatherIcon:'',
  loaded:false
};

function initContext(){
  var now = new Date();
  var month = now.getMonth()+1;
  var hour  = now.getHours();

  // Date
  ctx.dateStr = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  ctx.timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // Time period
  if(hour>=5&&hour<9)       ctx.timePeriod='이른 아침';
  else if(hour>=9&&hour<12) ctx.timePeriod='오전';
  else if(hour>=12&&hour<14)ctx.timePeriod='점심';
  else if(hour>=14&&hour<18)ctx.timePeriod='오후';
  else if(hour>=18&&hour<21)ctx.timePeriod='저녁';
  else                       ctx.timePeriod='밤';

  // Calendar season (Korea)
  if(month>=3&&month<=5)       ctx.calSeason='봄 🌸';
  else if(month>=6&&month<=8)  ctx.calSeason='여름 ☀️';
  else if(month>=9&&month<=11) ctx.calSeason='가을 🍂';
  else                          ctx.calSeason='겨울 ❄️';

  // Fetch weather via Open-Meteo (free, no key)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat=pos.coords.latitude.toFixed(4);
      var lon=pos.coords.longitude.toFixed(4);
      fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
        +'&current=temperature_2m,weathercode&timezone=auto')
      .then(function(r){return r.json();})
      .then(function(d){
        var temp = Math.round(d.current.temperature_2m);
        var code = d.current.weathercode;
        ctx.weatherTemp = temp+'°C';
        ctx.weatherDesc = wmoDesc(code);
        ctx.weatherIcon = wmoIcon(code);
        ctx.loaded = true;
        // refresh topbar if in main phase
        if(state.phase==='main') renderWeatherBar();
      })
      .catch(function(){ ctx.loaded=true; });
    }, function(){ ctx.loaded=true; });
  } else {
    ctx.loaded = true;
  }
}

function wmoDesc(code){
  if(code===0)return '맑음';
  if(code<=2) return '구름 조금';
  if(code<=3) return '흐림';
  if(code<=49)return '안개';
  if(code<=59)return '이슬비';
  if(code<=69)return '비';
  if(code<=79)return '눈';
  if(code<=82)return '소나기';
  if(code<=99)return '뇌우';
  return '흐림';
}
function wmoIcon(code){
  if(code===0)return '☀️';
  if(code<=2) return '⛅';
  if(code<=3) return '☁️';
  if(code<=49)return '🌫️';
  if(code<=69)return '🌧️';
  if(code<=79)return '❄️';
  if(code<=82)return '🌦️';
  return '⛈️';
}

function renderWeatherBar(){
  var bar = document.getElementById('weatherBar');
  if(!bar) return;
  var weatherPart = ctx.weatherTemp
    ? ctx.weatherIcon+' '+ctx.weatherDesc+' '+ctx.weatherTemp+' · '
    : '';
  bar.textContent = weatherPart + ctx.calSeason + ' · ' + ctx.timePeriod + ' · ' + ctx.timeStr;
}

function weatherBarHTML(){
  var weatherPart = ctx.weatherTemp
    ? ctx.weatherIcon+' '+ctx.weatherDesc+' '+ctx.weatherTemp+' · '
    : '';
  var text = weatherPart + ctx.calSeason + ' · ' + ctx.timePeriod + ' · ' + ctx.timeStr;
  return '<div id="weatherBar" style="'+
    'font-size:.74rem;font-weight:700;color:var(--gold-deep);'+
    'background:var(--gold-bg);border-radius:999px;'+
    'padding:5px 14px;display:inline-flex;align-items:center;gap:4px;'+
    'letter-spacing:.01em;margin-bottom:12px;">'+text+'</div>';
}

function ctxSummary(){
  var w = ctx.weatherTemp ? '날씨 '+ctx.weatherDesc+' '+ctx.weatherTemp+',' : '';
  return ctx.calSeason.replace(/\s*[🌸☀️🍂❄️]/u,'').trim()+'계절, '+w+' '+ctx.timePeriod+', '+ctx.dateStr;
}


document.getElementById('backBtn').addEventListener('click',goBack);
initSTT();
initContext();
renderDiag();

window.GraceApp={
  goNext:goNext, goBack:goBack, restart:restart, switchTab:switchTab,
  selectGender:selectGender, selectBody:selectBody, answerColor:answerColor,
  toggleCoach:toggleCoach, sendQuick:sendQuick,
  setCat:setCat, shareChatMsg:shareChatMsg,
  shareReport:shareReport,
  copyReport:function(){ copyToClipboard(buildShareText()); },
  shareKakao:shareKakao,
  shareInsta:shareInsta
};
})();
</script>
