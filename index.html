<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GRACE AI — 어른의 품격</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#2B2A33; --ink-soft:#736C72; --paper:#FBF7F1; --backdrop:#E9E2D6; --line:#E1D6C6;
  --gold:#B6925B; --gold-deep:#8E7240; --gold-bg:#F4E9D6;
  --navy:#22395C; --navy-soft:#E3E8EF;
  --rose:#9C5E78; --rose-soft:#F1E1E8;
  --good:#4C7A5E; --good-soft:#E6F2EB;
  --danger:#B04040;
  --radius-card:18px; --radius-btn:16px;
  --shadow:0 18px 40px -16px rgba(43,42,51,0.28);
  --shadow-sm:0 4px 16px -6px rgba(43,42,51,0.18);
  /* 반응형 기준 크기 */
  --fs-base:clamp(15px, 4vw, 17px);
  --fs-sm:clamp(12px, 3.2vw, 14px);
  --fs-md:clamp(14px, 3.8vw, 16px);
  --fs-lg:clamp(16px, 4.2vw, 18px);
  --fs-xl:clamp(20px, 5.5vw, 24px);
  --fs-xxl:clamp(24px, 6.5vw, 30px);
  --btn-h:clamp(50px, 13vw, 62px);
  --tab-h:clamp(56px, 14vw, 68px);
  --pad-h:clamp(16px, 4.5vw, 26px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{font-size:var(--fs-base); text-size-adjust:100%; -webkit-text-size-adjust:100%;}
body{
  margin:0; min-height:100dvh;
  background:var(--backdrop);
  background-image:radial-gradient(circle at 18% 12%,rgba(182,146,91,.10),transparent 45%),
                   radial-gradient(circle at 84% 86%,rgba(34,57,92,.08),transparent 45%);
  font-family:'Noto Sans KR',sans-serif; color:var(--ink);
  display:flex; align-items:center; justify-content:center;
  padding:clamp(0px,3vw,28px) clamp(0px,2vw,12px);
  overscroll-behavior:none;
}
.serif{font-family:'Noto Serif KR',serif;}

/* ── Device shell ── */
.device{
  width:100%; max-width:430px;
  height:100dvh;
  max-height:min(900px, 100dvh);
  background:var(--paper); border-radius:clamp(0px,4vw,34px);
  box-shadow:var(--shadow); border:1px solid rgba(43,42,51,.06);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
@media(min-width:500px){
  body{padding:20px 12px;}
  .device{height:min(900px,96dvh); border-radius:34px; box-shadow:var(--shadow);}
}
@media(max-width:499px){
  body{padding:0;}
  .device{border-radius:0; box-shadow:none; border:none; max-height:none;}
}

/* ── Topbar ── */
.topbar{
  flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  padding:max(env(safe-area-inset-top,12px),14px) var(--pad-h) 8px;
  min-height:52px; z-index:10;
}
.icon-btn{
  width:clamp(36px,9vw,44px); height:clamp(36px,9vw,44px);
  border-radius:50%; border:1px solid var(--line);
  background:#fff; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink); flex-shrink:0;
  touch-action:manipulation;
}
.icon-btn svg{width:clamp(18px,4.5vw,22px); height:clamp(18px,4.5vw,22px);}
.icon-btn:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
.icon-btn.hidden{visibility:hidden;}
.dots{display:flex; gap:7px; align-items:center;}
.dot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:background .25s,transform .25s;}
.dot.active{background:var(--gold); transform:scale(1.3);}
.brandmini{font-size:clamp(.68rem,2.8vw,.78rem); letter-spacing:.14em; font-weight:700; color:var(--gold-deep);}
.brandmini.hidden{visibility:hidden;}

/* ── Zones (diagnosis) ── */
.visual-zone{flex:0 0 36%; display:flex; align-items:center; justify-content:center; padding:6px var(--pad-h); overflow:hidden;}
.content-zone{flex:1 1 auto; overflow-y:auto; padding:4px var(--pad-h) 10px; -webkit-overflow-scrolling:touch;}
.action-bar{
  flex:0 0 auto; padding:12px var(--pad-h) max(env(safe-area-inset-bottom,16px),18px);
  display:flex; flex-direction:column; gap:10px;
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,rgba(251,247,241,.4),var(--paper) 35%);
}

/* ── Tab layout ── */
.main-body{flex:1 1 auto; overflow:hidden; display:flex; flex-direction:column;}
.tab-content{
  flex:1 1 auto; overflow-y:auto;
  padding:14px var(--pad-h) calc(env(safe-area-inset-bottom,0px) + 80px);
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.bottom-nav{
  flex:0 0 auto; display:flex; align-items:stretch;
  border-top:1px solid var(--line); background:var(--paper);
  padding-bottom:env(safe-area-inset-bottom,0px);
  min-height:var(--tab-h);
}
.nav-tab{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; padding:8px 2px max(env(safe-area-inset-bottom,8px),10px);
  cursor:pointer; border:none; background:transparent;
  color:var(--ink-soft); font-family:'Noto Sans KR',sans-serif;
  font-size:clamp(.65rem,2.5vw,.72rem); font-weight:500;
  position:relative; transition:color .15s;
  touch-action:manipulation;
}
.nav-tab svg{width:clamp(20px,5.5vw,24px); height:clamp(20px,5.5vw,24px); transition:color .15s;}
.nav-tab.active{color:var(--gold-deep);}
.nav-tab.active::after{content:''; position:absolute; top:0; left:20%; right:20%; height:2.5px; background:var(--gold); border-radius:0 0 3px 3px;}
.nav-tab.active-navy{color:var(--navy);}
.nav-tab.active-navy::after{background:var(--navy);}
.nav-tab.active-rose{color:var(--rose);}
.nav-tab.active-rose::after{background:var(--rose);}

/* ── Typography ── */
.eyebrow{font-size:clamp(.72rem,2.8vw,.82rem); font-weight:700; letter-spacing:.08em; color:var(--ink-soft); margin:2px 0 8px;}
h1.title{font-family:'Noto Serif KR',serif; font-size:clamp(1.2rem,5vw,1.5rem); line-height:1.35; font-weight:700; margin:0 0 8px;}
p.desc{font-size:clamp(.86rem,3.4vw,.96rem); line-height:1.6; color:var(--ink-soft); margin:0 0 14px;}
.section-title{font-size:clamp(.9rem,3.5vw,1.06rem); font-weight:700; margin:14px 0 10px; font-family:'Noto Serif KR',serif;}

/* ── Buttons ── */
.btn{
  appearance:none; border:none; border-radius:var(--radius-btn);
  min-height:var(--btn-h); padding:0 16px;
  font-family:'Noto Sans KR',sans-serif; font-size:clamp(.9rem,3.6vw,1rem); font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  gap:8px; width:100%;
  transition:transform .12s,opacity .2s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none; user-select:none;
}
.btn:active{transform:scale(.98);}
.btn:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary.tone-navy{background:var(--navy);}
.btn-primary.tone-rose{background:var(--rose);}
.btn-primary.tone-gold{background:var(--gold);}
.btn-primary:disabled{background:#D9D2C4; color:#A39E91; cursor:not-allowed;}
.btn-ghost{background:transparent; color:var(--ink-soft); font-weight:500; min-height:clamp(40px,10vw,48px);}
.btn-sm{min-height:clamp(44px,11vw,52px); font-size:clamp(.84rem,3.2vw,.9rem); border-radius:14px; padding:0 14px;}

/* ── Option cards ── */
.option-stack{display:flex; flex-direction:column; gap:clamp(8px,2.5vw,12px); margin-bottom:8px;}
.option-card{
  border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-card);
  padding:clamp(12px,3.5vw,16px); display:flex; align-items:center; gap:12px;
  cursor:pointer; text-align:left; width:100%;
  transition:border-color .15s,background .15s,transform .1s;
  font-family:'Noto Sans KR',sans-serif;
  touch-action:manipulation;
}
.option-card:active{transform:scale(.99);}
.option-card .oc-icon{flex:0 0 auto; width:clamp(38px,10vw,46px); height:clamp(38px,10vw,46px); border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--navy-soft); color:var(--navy);}
.option-card.rose .oc-icon{background:var(--rose-soft); color:var(--rose);}
.option-card .oc-icon svg{width:clamp(18px,5vw,22px); height:clamp(18px,5vw,22px);}
.option-card .oc-label{font-size:clamp(.88rem,3.4vw,1rem); font-weight:700; color:var(--ink); margin:0 0 2px;}
.option-card .oc-sub{font-size:clamp(.74rem,2.8vw,.84rem); color:var(--ink-soft); margin:0; line-height:1.45;}
.option-card.selected{border-color:var(--gold); background:#FFFBF3;}
.option-card.selected.tone-navy{border-color:var(--navy);}
.option-card.selected.tone-rose{border-color:var(--rose);}
.check-mark{flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;}
.option-card.selected .check-mark{background:var(--gold); border-color:var(--gold);}
.option-card.selected.tone-navy .check-mark{background:var(--navy); border-color:var(--navy);}
.option-card.selected.tone-rose .check-mark{background:var(--rose); border-color:var(--rose);}
.check-mark svg{width:14px; height:14px; color:#fff; visibility:hidden;}
.option-card.selected .check-mark svg{visibility:visible;}

/* ── Splash ── */
.splash-wrap{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 var(--pad-h);}
.splash-mark{font-family:'Noto Serif KR',serif; font-size:clamp(1.6rem,7vw,2.2rem); font-weight:700; letter-spacing:.04em;}
.splash-mark span{color:var(--gold);}
.splash-sub{font-size:clamp(.9rem,3.6vw,1.04rem); color:var(--ink-soft); margin:10px 0 0; line-height:1.6;}
.splash-tagline{margin-top:24px; font-size:clamp(.74rem,2.8vw,.86rem); letter-spacing:.05em; color:var(--gold-deep); font-weight:700;}

/* ── Dial ── */
.dial-wrap{display:flex; flex-direction:column; align-items:center; gap:6px;}
.dial-caption{font-size:clamp(.74rem,2.8vw,.84rem); color:var(--ink-soft); font-weight:700; text-align:center;}

/* ── Scan/ring ── */
.ring-wrap{position:relative; width:clamp(100px,28vw,128px); height:clamp(100px,28vw,128px); display:flex; align-items:center; justify-content:center;}
.ring-wrap svg{display:block;}
.ring-pct{position:absolute; font-weight:900; font-size:clamp(1rem,4vw,1.3rem); color:var(--ink);}
.scan-box{position:absolute; border:2px solid var(--gold); border-radius:6px; opacity:0; animation:scanblink 2.4s ease-in-out infinite;}
@keyframes scanblink{0%,100%{opacity:0;}18%{opacity:1;}38%{opacity:0;}}

/* ── Result cards ── */
.result-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius-card); padding:clamp(12px,3.5vw,16px); margin-bottom:12px;}
.result-card h3{margin:0 0 6px; font-size:clamp(.88rem,3.4vw,1rem); font-family:'Noto Serif KR',serif;}
.result-card p{margin:0; font-size:clamp(.82rem,3.2vw,.9rem); line-height:1.55; color:var(--ink-soft);}
.swatch-row{display:flex; gap:8px; margin-top:12px;}
.swatch{width:clamp(24px,6vw,30px); height:clamp(24px,6vw,30px); border-radius:50%; border:1px solid rgba(0,0,0,.08);}

/* ── Chips ── */
.chip-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.chip{border-radius:999px; padding:5px 11px; font-size:clamp(.72rem,2.8vw,.8rem); font-weight:700; background:var(--navy-soft); color:var(--navy);}
.chip.rose{background:var(--rose-soft); color:var(--rose);}
.chip.gold{background:var(--gold-bg); color:var(--gold-deep);}

/* ── Coaching ── */
.coach-card{
  display:flex; align-items:flex-start; gap:10px;
  background:#fff; border:1.5px solid var(--line); border-radius:var(--radius-card);
  padding:clamp(12px,3.5vw,15px); margin-bottom:10px;
  cursor:pointer; transition:border-color .15s,background .15s;
  text-align:left; width:100%; font-family:'Noto Sans KR',sans-serif;
  touch-action:manipulation;
}
.coach-card.done{border-color:var(--good); background:var(--good-soft);}
.coach-box{flex:0 0 auto; width:26px; height:26px; border-radius:8px; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; margin-top:2px;}
.coach-card.done .coach-box{background:var(--good); border-color:var(--good);}
.coach-box svg{width:14px; height:14px; color:#fff; visibility:hidden;}
.coach-card.done .coach-box svg{visibility:visible;}
.coach-title{font-weight:700; font-size:clamp(.86rem,3.4vw,.96rem); margin:0 0 3px;}
.coach-desc{font-size:clamp(.76rem,3vw,.84rem); color:var(--ink-soft); line-height:1.5; margin:0;}
.coach-tag{display:inline-block; margin-top:6px; font-size:.72rem; font-weight:700; color:var(--gold-deep); background:var(--gold-bg); border-radius:8px; padding:2px 8px;}

/* ── Report ── */
.report-card{background:linear-gradient(160deg,#fff,#FBF4E8); border:1px solid var(--line); border-radius:20px; padding:clamp(14px,4vw,20px); margin-bottom:14px;}
.report-row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed var(--line); font-size:clamp(.82rem,3.2vw,.9rem);}
.report-row:last-child{border-bottom:none;}
.report-row span:first-child{color:var(--ink-soft);}
.report-row span:last-child{font-weight:700; text-align:right;}
.report-msg{font-family:'Noto Serif KR',serif; font-size:clamp(.9rem,3.6vw,1.06rem); line-height:1.6; text-align:center; margin:6px 0 16px;}
.note-card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px; font-size:clamp(.76rem,3vw,.84rem); color:var(--ink-soft); line-height:1.55; display:flex; gap:10px; align-items:flex-start;}
.note-card svg{flex:0 0 auto; width:18px; height:18px; color:var(--gold-deep); margin-top:1px;}

/* ── Chat ── */
.chat-wrap{display:flex; flex-direction:column; height:100%; overflow:hidden;}
.chat-messages{flex:1 1 auto; overflow-y:auto; padding:8px 2px 8px; display:flex; flex-direction:column; gap:10px; overscroll-behavior-y:contain;}
.msg-row{display:flex; gap:8px; align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{
  flex:0 0 auto; width:clamp(30px,8vw,38px); height:clamp(30px,8vw,38px); border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif KR',serif; font-size:clamp(.68rem,2.8vw,.78rem); font-weight:700; color:#fff;
  box-shadow:0 2px 8px rgba(182,146,91,.4); flex-shrink:0;
}
.msg-bubble{
  max-width:78%; padding:clamp(10px,3vw,13px) clamp(12px,3.5vw,15px);
  border-radius:18px 18px 18px 4px;
  background:#fff; border:1px solid var(--line);
  font-size:clamp(.84rem,3.4vw,.95rem); line-height:1.6; color:var(--ink);
  word-break:break-word;
}
.msg-row.user .msg-bubble{border-radius:18px 18px 4px 18px; background:var(--navy); color:#fff; border:none;}
.msg-row.user.rose .msg-bubble{background:var(--rose);}
.typing-indicator{display:flex; gap:4px; align-items:center; padding:10px 12px;}
.typing-dot{width:7px; height:7px; border-radius:50%; background:var(--ink-soft); animation:typingpulse 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingpulse{0%,80%,100%{transform:scale(1);opacity:.5;}40%{transform:scale(1.3);opacity:1;}}

/* Quick replies */
.quick-row{display:flex; gap:6px; flex-wrap:wrap; padding:6px 0 4px;}
.quick-chip{
  border:1.5px solid var(--gold); background:#fff; border-radius:999px;
  padding:7px 13px; font-size:clamp(.76rem,3vw,.86rem); font-weight:700; color:var(--gold-deep);
  cursor:pointer; transition:background .12s,color .12s;
  font-family:'Noto Sans KR',sans-serif; touch-action:manipulation;
  white-space:nowrap;
}
.quick-chip:active{background:var(--gold); color:#fff;}
.quick-chip.navy-style{border-color:var(--navy); color:var(--navy);}
.quick-chip.navy-style:active{background:var(--navy); color:#fff;}
.quick-chip.rose-style{border-color:var(--rose); color:var(--rose);}
.quick-chip.rose-style:active{background:var(--rose); color:#fff;}

/* Chat input */
.chat-input-bar{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:8px var(--pad-h) max(env(safe-area-inset-bottom,10px),12px);
  border-top:1px solid var(--line); background:var(--paper);
}
.chat-input-wrap{
  flex:1; display:flex; align-items:center; gap:6px;
  background:#fff; border:1.5px solid var(--line); border-radius:24px;
  padding:6px 6px 6px 14px; min-height:46px;
  transition:border-color .15s;
}
.chat-input-wrap:focus-within{border-color:var(--gold);}
.chat-input-wrap.listening{border-color:var(--danger);}
#chatInput{
  flex:1; border:none; outline:none; background:transparent;
  font-family:'Noto Sans KR',sans-serif; font-size:clamp(.88rem,3.4vw,.96rem); color:var(--ink);
  resize:none; min-height:22px; max-height:88px; overflow-y:auto; line-height:1.5;
}
#chatInput::placeholder{color:#C4B9AE;}
.voice-btn{
  flex:0 0 auto; width:36px; height:36px; border-radius:50%; border:none;
  background:var(--gold-bg); color:var(--gold-deep);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:background .15s,transform .1s; touch-action:manipulation;
}
.voice-btn:active{transform:scale(.92);}
.voice-btn.listening{background:var(--danger); color:#fff; animation:pulse-ring .8s ease infinite;}
.voice-btn svg{width:17px; height:17px;}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(176,64,64,.4);}70%{box-shadow:0 0 0 10px rgba(176,64,64,0);}100%{box-shadow:0 0 0 0 rgba(176,64,64,0);}}
.send-btn{
  flex:0 0 auto; width:44px; height:44px; border-radius:50%; border:none;
  background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .15s,transform .12s; touch-action:manipulation;
}
.send-btn.tone-navy{background:var(--navy);}
.send-btn.tone-rose{background:var(--rose);}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{background:#D9D2C4; cursor:not-allowed;}
.send-btn svg{width:17px; height:17px;}
.stt-badge{
  display:none; align-items:center; gap:6px;
  background:#fff; border:1px solid var(--danger); border-radius:10px;
  padding:6px 12px; font-size:.8rem; font-weight:700; color:var(--danger);
  position:absolute; bottom:76px; left:50%; transform:translateX(-50%);
  white-space:nowrap; box-shadow:var(--shadow-sm); z-index:20;
}
.stt-badge.show{display:flex;}
.stt-dot{width:8px; height:8px; border-radius:50%; background:var(--danger); animation:typingpulse .8s infinite;}

/* Chat category tabs */
.chat-cats{display:flex; gap:6px; overflow-x:auto; padding:8px 0 4px; scrollbar-width:none; -ms-overflow-style:none; flex-shrink:0;}
.chat-cats::-webkit-scrollbar{display:none;}
.cat-tab{flex:0 0 auto; border-radius:999px; padding:7px 13px; font-size:clamp(.7rem,2.8vw,.78rem); font-weight:700; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:background .12s,color .12s,border-color .12s; touch-action:manipulation; white-space:nowrap;}
.cat-tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}
.cat-tab.active-navy{background:var(--navy); color:#fff; border-color:var(--navy);}
.cat-tab.active-rose{background:var(--rose); color:#fff; border-color:var(--rose);}

/* Message share button */
.msg-share-btn{
  display:inline-flex; align-items:center; gap:4px; margin-top:7px;
  border:1px solid var(--line); background:#fff; border-radius:999px;
  padding:4px 10px; font-size:clamp(.66rem,2.6vw,.72rem); font-weight:700; color:var(--ink-soft);
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; touch-action:manipulation;
  transition:background .12s,color .12s;
}
.msg-share-btn:active{background:var(--gold-bg); color:var(--gold-deep);}
.msg-share-btn svg{width:12px; height:12px;}

/* ── 공유 바텀시트 ── */
.share-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:10000;
  display:flex; align-items:flex-end; justify-content:center;
  animation:fadeInOverlay .2s ease;
}
@keyframes fadeInOverlay{from{opacity:0;}to{opacity:1;}}
.share-sheet{
  background:#fff; border-radius:28px 28px 0 0;
  padding:0 0 max(env(safe-area-inset-bottom,16px),16px);
  width:100%; max-width:430px;
  box-shadow:0 -8px 40px rgba(0,0,0,.2);
  animation:slideUpSheet .28s cubic-bezier(.22,1,.36,1);
  max-height:90dvh; overflow-y:auto;
}
@keyframes slideUpSheet{from{transform:translateY(100%);}to{transform:translateY(0);}}
.share-sheet-handle{width:40px; height:4px; background:#E1D6C6; border-radius:999px; margin:14px auto 0;}
.share-preview{width:calc(100% - 40px); margin:14px 20px 0; border-radius:14px; overflow:hidden; max-height:160px; object-fit:cover; display:block; box-shadow:0 4px 16px rgba(0,0,0,.12);}
.share-title{font-family:'Noto Serif KR',serif; font-size:clamp(.96rem,3.8vw,1.06rem); font-weight:700; text-align:center; padding:12px 20px 4px;}
.share-desc{font-size:clamp(.76rem,3vw,.82rem); color:var(--ink-soft); text-align:center; padding:0 24px 10px; line-height:1.5;}
.share-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px 8px;}
.share-btn-item{
  display:flex; flex-direction:column; align-items:center; gap:5px;
  border:1.5px solid var(--line); border-radius:16px; padding:clamp(10px,3vw,14px) 8px;
  cursor:pointer; background:#fff; font-family:'Noto Sans KR',sans-serif;
  transition:background .12s,transform .1s; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.share-btn-item:active{transform:scale(.96); background:#F8F5F0;}
.share-btn-item .sb-icon{width:clamp(38px,10vw,44px); height:clamp(38px,10vw,44px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; margin-bottom:2px;}
.share-btn-item .sb-label{font-size:clamp(.74rem,2.8vw,.8rem); font-weight:700; color:var(--ink);}
.share-btn-item .sb-sub{font-size:clamp(.62rem,2.4vw,.68rem); color:var(--ink-soft);}
.share-full-btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin:4px 16px 8px; min-height:clamp(46px,12vw,54px);
  border-radius:14px; font-size:clamp(.88rem,3.4vw,.96rem); font-weight:700;
  cursor:pointer; border:none; font-family:'Noto Sans KR',sans-serif;
  transition:opacity .15s,transform .1s; touch-action:manipulation;
}
.share-full-btn:active{transform:scale(.98); opacity:.85;}
.share-close-btn{
  width:calc(100% - 32px); margin:0 16px 8px;
  min-height:clamp(44px,11vw,50px); border-radius:14px;
  border:1.5px solid var(--line); background:#fff;
  font-size:clamp(.88rem,3.4vw,.96rem); font-weight:500; color:var(--ink-soft);
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; touch-action:manipulation;
  display:block;
}

/* Chat empty state */
.chat-empty{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:0 var(--pad-h); gap:8px;}
.chat-empty-icon{font-size:clamp(1.8rem,6vw,2.4rem);}
.chat-empty-title{font-family:'Noto Serif KR',serif; font-size:clamp(.96rem,3.8vw,1.1rem); font-weight:700;}
.chat-empty-sub{font-size:clamp(.78rem,3vw,.88rem); color:var(--ink-soft); line-height:1.55;}

/* Animations */
.fade-in{animation:fadein .32s ease both;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.skip-link{text-align:center; font-size:clamp(.76rem,3vw,.84rem); color:var(--ink-soft); text-decoration:underline; cursor:pointer; margin-top:12px; background:none; border:none; touch-action:manipulation;}



@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important; transition-duration:.001ms!important;}}

/* ── QR 코드 모달 ── */
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.62);z-index:20000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .2s ease;}
.qr-modal{background:#fff;border-radius:28px;padding:28px 24px 22px;width:100%;max-width:330px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.35);}
.qr-brand{font-size:.75rem;font-weight:700;color:var(--gold-deep);letter-spacing:.12em;margin-bottom:4px;}
.qr-title{font-family:'Noto Serif KR',serif;font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:6px;}
.qr-desc{font-size:.8rem;color:var(--ink-soft);line-height:1.6;margin-bottom:18px;}
.qr-box{width:188px;height:188px;margin:0 auto 14px;border-radius:14px;overflow:hidden;border:3px solid var(--gold-bg);padding:8px;background:#fff;display:flex;align-items:center;justify-content:center;}
.qr-box canvas,.qr-box img{width:100%!important;height:100%!important;}
.qr-url{font-size:.7rem;color:var(--ink-soft);word-break:break-all;background:#F8F5F0;border-radius:10px;padding:8px 12px;margin-bottom:14px;line-height:1.5;text-align:left;}
.qr-actions{display:flex;gap:8px;}
.qr-btn{flex:1;min-height:46px;border-radius:13px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;}
.qr-btn-copy{background:var(--gold-bg);color:var(--gold-deep);}
.qr-btn-close{background:var(--ink);color:#fff;}

function dialSVG(size,angle,dim){
  size=size||132; var op=dim?0.35:1;
  return '<div class="dial-wrap">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 120 120" style="opacity:'+op+'">'+
      '<path d="M60,60 L60,10 A50,50 0 0,1 110,60 Z" fill="#F3B79A"/>'+
      '<path d="M60,60 L110,60 A50,50 0 0,1 60,110 Z" fill="#B97A4A"/>'+
      '<path d="M60,60 L60,110 A50,50 0 0,1 10,60 Z" fill="#AFD3E0"/>'+
      '<path d="M60,60 L10,60 A50,50 0 0,1 60,10 Z" fill="#2F4566"/>'+
      '<circle cx="60" cy="60" r="50" fill="none" stroke="#fff" stroke-width="3"/>'+
      '<g style="transform:rotate('+angle+'deg);transform-origin:60px 60px;transition:transform .6s cubic-bezier(.22,1,.36,1);">'+
        '<polygon points="60,16 65,60 60,66 55,60" fill="#2B2A33"/>'+
        '<circle cx="60" cy="60" r="7" fill="#fff" stroke="#2B2A33" stroke-width="2"/>'+
      '</g>'+
    '</svg></div>';
}
function dialAngle(){
  if(state.colorStep===0)return 0;
  if(state.colorStep===1)return state.warmCool==='warm'?90:270;
  return {spring:45,autumn:135,summer:225,winter:315}[state.season]||0;
}
function nowTime(){var d=new Date();return d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}

function optionCard(value,selected,iconName,label,sub,tone,handler){
  var roseClass=tone==='rose'?' rose':'';
  var selClass=selected?(' selected'+(tone?' tone-'+tone:'')):'';
  return '<button class="option-card'+roseClass+selClass+'" onclick="'+handler+'">'+
    '<div class="oc-icon">'+svgIcon(iconName)+'</div>'+
    '<div style="flex:1"><p class="oc-label">'+label+'</p><p class="oc-sub">'+sub+'</p></div>'+
    '<div class="check-mark">'+svgIcon('check')+'</div>'+
  '</button>';
}
function plainCard(value,selected,label,sub,tone,handler){
  var roseClass=tone==='rose'?' rose':'';
  var selClass=selected?(' selected'+(tone?' tone-'+tone:'')):'';
  return '<button class="option-card'+roseClass+selClass+'" onclick="'+handler+'">'+
    '<div style="flex:1"><p class="oc-label">'+label+'</p><p class="oc-sub">'+sub+'</p></div>'+
    '<div class="check-mark">'+svgIcon('check')+'</div>'+
  '</button>';
}

function actionsFor(step){

/* ── 리포트 점수 계산 ── */
function calcScores(){
  var done=Object.keys(state.coachDone).filter(function(k){return state.coachDone[k];}).length;
  var chatCount=Math.floor(state.chatHistory.length/2);
  var bodyScore = state.bodyKey ? 25 : 0;
  var colorScore = state.season ? 25 : 0;
  var coachScore = Math.round((done/COACH.length)*30);
  var chatScore  = Math.min(chatCount*5, 20);
  return {
    total: bodyScore+colorScore+coachScore+chatScore,
    body: bodyScore, color: colorScore,
    coach: coachScore, chat: chatScore,
    done: done, chatCount: chatCount
  };
}

/* ── 원형 스코어 SVG ── */
function scoreSVG(score, color){
  var r=36, c=44, circ=2*Math.PI*r;
  var offset=circ*(1-score/100);
  return '<svg width="88" height="88" viewBox="0 0 88 88">'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#E9E2D6" stroke-width="7"/>'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7"'+
      ' stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"'+
      ' transform="rotate(-90 '+c+' '+c+')" style="transition:stroke-dashoffset 1s ease"/>'+
    '<text x="'+c+'" y="'+(c+5)+'" text-anchor="middle" font-size="16" font-weight="900" fill="#2B2A33" font-family="sans-serif">'+score+'</text>'+
  '</svg>';
}

/* ── 캔버스 헬퍼 (모바일 최적화) ── */
function roundRectPath(ctx2,x,y,w,h,r){
  ctx2.beginPath();
  ctx2.moveTo(x+r,y); ctx2.lineTo(x+w-r,y);
  ctx2.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx2.lineTo(x+w,y+h-r);
  ctx2.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx2.lineTo(x+r,y+h);
  ctx2.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx2.lineTo(x,y+r);
  ctx2.quadraticCurveTo(x,y,x+r,y);
  ctx2.closePath();
}
function wrapTextCanvas(ctx2,text,x,y,maxW,lineH){
  if(!text) return;
  var words=text.split(' '), line='';
  var linesLeft=4;
  for(var i=0;i<words.length&&linesLeft>0;i++){
    var test=line+words[i]+' ';
    if(ctx2.measureText(test).width>maxW&&i>0){
      ctx2.fillText(line,x,y); line=words[i]+' '; y+=lineH; linesLeft--;
    } else { line=test; }
  }
  if(linesLeft>0) ctx2.fillText(line,x,y);
}

function getSeasonPalette(){
  var map={
    spring:{from:'#E8896A',to:'#C96E45',text:'#fff'},
    summer:{from:'#8097BC',to:'#5C6F94',text:'#fff'},
    autumn:{from:'#A0622A',to:'#6E3F14',text:'#fff'},
    winter:{from:'#2F4566',to:'#1A2840',text:'#fff'}
  };
  return map[state.season]||{from:'#22395C',to:'#0E1E33',text:'#fff'};
}



function getGradeLabel(){
  var sc=calcScores();
  if(sc.total>=80) return 'Signature Grace';
  if(sc.total>=60) return 'Rising Grace';
  if(sc.total>=40) return 'Awakening Grace';
  return 'First Grace';
}



function generateChatCard(question, answer){
  return new Promise(function(resolve){
    // 모바일 메모리 절약: 디바이스 픽셀비 반영한 적정 크기
    var dpr=Math.min(window.devicePixelRatio||1, 2);
    var W=Math.round(Math.min(window.innerWidth*0.9, 640));
    var H=Math.round(W*0.78);
    var cv=document.createElement('canvas');
    cv.width=W*dpr; cv.height=H*dpr;
    var g=cv.getContext('2d');
    g.scale(dpr,dpr);
    var pal=getSeasonPalette();
    var isMale=state.gender==='male';

    // 배경
    var bg=g.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,pal.from); bg.addColorStop(1,pal.to);
    g.fillStyle=bg; g.fillRect(0,0,W,H);

    // 장식 원
    g.globalAlpha=0.07; g.fillStyle='#fff';
    g.beginPath(); g.arc(W-50,50,W*0.2,0,Math.PI*2); g.fill();
    g.globalAlpha=1;

    // 헤더
    g.fillStyle='rgba(255,255,255,0.18)';
    roundRectPath(g,0,0,W,58,0); g.fill();
    g.fillStyle='#fff';
    g.font='bold '+Math.round(W*0.034)+'px sans-serif';
    g.fillText('GRACE AI  ·  코칭 상담', Math.round(W*0.04), 34);
    g.font='400 '+Math.round(W*0.026)+'px sans-serif';
    g.fillStyle='rgba(255,255,255,0.65)';
    var trackLabel=(isMale?'남성·신뢰':'여성·우아함')+' · '+(ctx.dateStr||'');
    g.fillText(trackLabel.substring(0,32), Math.round(W*0.04), 52);

    // Q버블
    var ay=68;
    if(question){
      g.fillStyle='rgba(255,255,255,0.2)';
      roundRectPath(g,W*0.38,ay,W*0.57,Math.round(W*0.1),10); g.fill();
      g.fillStyle='#fff';
      g.font='400 '+Math.round(W*0.03)+'px sans-serif';
      var qs=question.length>28?question.substring(0,28)+'…':question;
      g.fillText('Q  '+qs, Math.round(W*0.4), ay+Math.round(W*0.065));
      ay+=Math.round(W*0.115);
    }

    // 답변 카드
    g.fillStyle='rgba(255,255,255,0.95)';
    roundRectPath(g,W*0.04,ay,W*0.92,H-ay-Math.round(W*0.08),14); g.fill();

    // 아바타
    var cr=Math.round(W*0.038);
    var cx2=Math.round(W*0.1), cy2=ay+Math.round(W*0.07);
    var grd=g.createRadialGradient(cx2,cy2,0,cx2,cy2,cr);
    grd.addColorStop(0,pal.from); grd.addColorStop(1,pal.to);
    g.fillStyle=grd;
    g.beginPath(); g.arc(cx2,cy2,cr,0,Math.PI*2); g.fill();
    g.fillStyle='#fff';
    g.font='bold '+Math.round(W*0.032)+'px serif';
    g.textAlign='center'; g.fillText('G',cx2,cy2+Math.round(W*0.012)); g.textAlign='left';

    g.fillStyle='#2B2A33';
    g.font='bold '+Math.round(W*0.03)+'px sans-serif';
    g.fillText('Grace AI 코칭', Math.round(W*0.16), ay+Math.round(W*0.054));
    g.fillStyle='#736C72';
    g.font='400 '+Math.round(W*0.024)+'px sans-serif';
    g.fillText((ctx.timeStr||'')+' · '+(ctx.calSeason||'').replace(/[^가-힣 ]/g,'').trim(), Math.round(W*0.16), ay+Math.round(W*0.082));

    // 구분선
    g.strokeStyle='#E1D6C6'; g.lineWidth=1;
    var lineY=ay+Math.round(W*0.1);
    g.beginPath(); g.moveTo(W*0.07,lineY); g.lineTo(W*0.93,lineY); g.stroke();

    // 답변 텍스트
    g.fillStyle='#2B2A33';
    g.font='400 '+Math.round(W*0.03)+'px sans-serif';
    var shortAns=answer&&answer.length>180?answer.substring(0,180)+'…':answer||'';
    wrapTextCanvas(g,shortAns,Math.round(W*0.07),lineY+Math.round(W*0.05),W*0.86,Math.round(W*0.042));

    // 하단 해시태그
    g.fillStyle='rgba(255,255,255,0.85)';
    g.fillRect(0,H-Math.round(W*0.08),W,Math.round(W*0.08));
    g.fillStyle=pal.from;
    g.font='bold '+Math.round(W*0.026)+'px sans-serif';
    g.textAlign='center';
    g.fillText('#GraceAI  #이미지코칭  #4050품격', W/2, H-Math.round(W*0.025));
    g.textAlign='left';

    try{
      resolve({dataUrl:cv.toDataURL('image/jpeg',0.88), name:'grace-ai-chat.jpg'});
    }catch(e){
      // canvas tainted fallback: solid color card
      var cv2=document.createElement('canvas'); cv2.width=2; cv2.height=2;
      resolve({dataUrl:cv2.toDataURL(), name:'grace-ai-chat.png'});
    }
  });
}function generateShareCard(){
  return new Promise(function(resolve){
    var dpr=Math.min(window.devicePixelRatio||1, 2);
    var W=Math.round(Math.min(window.innerWidth*0.9, 640));
    var H=Math.round(W*1.38);
    var cv=document.createElement('canvas');
    cv.width=W*dpr; cv.height=H*dpr;
    var g=cv.getContext('2d');
    g.scale(dpr,dpr);
    var bd=bodyData(); var s=seasonData(); var sc=calcScores();
    var isMale=state.gender==='male';
    var pal=getSeasonPalette();
    var p=COLOR_PALETTE[state.season];

    // 배경
    var bg=g.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,pal.from); bg.addColorStop(1,pal.to);
    g.fillStyle=bg; g.fillRect(0,0,W,H);
    g.globalAlpha=0.07; g.fillStyle='#fff';
    g.beginPath(); g.arc(W-40,50,W*0.22,0,Math.PI*2); g.fill();
    g.beginPath(); g.arc(40,H-60,W*0.18,0,Math.PI*2); g.fill();
    g.globalAlpha=1;

    var fs=function(n){return Math.round(W*n);};

    // 헤더
    g.fillStyle='rgba(255,255,255,0.16)';
    roundRectPath(g,0,0,W,62,0); g.fill();
    g.fillStyle='#fff';
    g.font='bold '+fs(0.042)+'px sans-serif';
    g.fillText('GRACE AI', fs(0.05), 36);
    g.font='400 '+fs(0.03)+'px sans-serif';
    g.fillStyle='rgba(255,255,255,0.7)';
    g.fillText((ctx.dateStr||'').substring(0,20), fs(0.05), 54);

    // 점수 원
    var cr=fs(0.1), cxc=W-fs(0.19), cyc=fs(0.22);
    g.strokeStyle='rgba(255,255,255,0.25)'; g.lineWidth=fs(0.018);
    g.beginPath(); g.arc(cxc,cyc,cr,-Math.PI/2,Math.PI*2-Math.PI/2); g.stroke();
    g.strokeStyle='#fff'; g.lineWidth=fs(0.018);
    var ang=(sc.total/100)*Math.PI*2-Math.PI/2;
    g.beginPath(); g.arc(cxc,cyc,cr,-Math.PI/2,ang); g.stroke();
    g.fillStyle='#fff'; g.font='bold '+fs(0.052)+'px sans-serif';
    g.textAlign='center'; g.fillText(sc.total,cxc,cyc+fs(0.018)); g.textAlign='left';
    g.font='500 '+fs(0.026)+'px sans-serif';
    g.fillStyle='rgba(255,255,255,0.7)';
    g.textAlign='center'; g.fillText('/ 100',cxc,cyc+fs(0.05)); g.textAlign='left';

    // 등급 배지
    var by=fs(0.12);
    g.fillStyle='rgba(255,255,255,0.18)';
    roundRectPath(g,fs(0.05),by,fs(0.52),fs(0.06),8); g.fill();
    g.fillStyle='#fff'; g.font='bold '+fs(0.03)+'px sans-serif';
    g.fillText('✦ '+getGradeLabel(), fs(0.07), by+fs(0.042));

    // 타이틀
    g.fillStyle='#fff';
    g.font='bold '+fs(0.046)+'px sans-serif';
    g.fillText(isMale?'신뢰와 성공':'우아함과 자아 일치', fs(0.05), fs(0.27));
    g.font='400 '+fs(0.032)+'px sans-serif';
    g.fillStyle='rgba(255,255,255,0.8)';
    g.fillText(isMale?'나만의 전문가 브랜드':'나만의 아름다움', fs(0.05), fs(0.31));

    // 흰색 카드 영역
    var cardy=fs(0.34);
    g.fillStyle='rgba(255,255,255,0.95)';
    roundRectPath(g,fs(0.04),cardy,W*0.92,H-cardy-fs(0.1),16); g.fill();

    // 진단 그리드
    var items=[
      {label:isMale?'골격':'체형', value:bd.label||'-'},
      {label:'퍼스널 컬러', value:s.label||'-'},
      {label:'종합 점수', value:sc.total+'점'},
      {label:'코칭', value:sc.done+'/4'}
    ];
    var gPad=fs(0.06), gW=(W*0.92-gPad*2)/2-fs(0.02);
    items.forEach(function(item,i){
      var col=i%2, row=Math.floor(i/2);
      var ix=fs(0.04)+gPad+col*(gW+fs(0.02));
      var iy=cardy+fs(0.04)+row*(fs(0.1)+fs(0.02));
      g.fillStyle='#F8F5F0';
      roundRectPath(g,ix,iy,gW,fs(0.1),8); g.fill();
      g.fillStyle='#736C72'; g.font='400 '+fs(0.026)+'px sans-serif';
      g.fillText(item.label, ix+fs(0.02), iy+fs(0.038));
      g.fillStyle='#2B2A33'; g.font='bold '+fs(0.032)+'px sans-serif';
      var val=item.value.length>8?item.value.substring(0,8)+'…':item.value;
      g.fillText(val, ix+fs(0.02), iy+fs(0.076));
    });

    // 컬러 팔레트
    var py=cardy+fs(0.26);
    g.fillStyle='#2B2A33'; g.font='bold '+fs(0.03)+'px sans-serif';
    g.fillText('퍼스널 컬러 팔레트', fs(0.08), py);
    if(p){
      var sw=(W*0.84)/p.colors.length;
      p.colors.forEach(function(c,i){
        var sx=fs(0.08)+i*sw;
        g.fillStyle=c.hex;
        roundRectPath(g,sx,py+fs(0.016),sw-fs(0.01),fs(0.06),6); g.fill();
        g.fillStyle='rgba(0,0,0,0.5)'; g.font='400 '+fs(0.022)+'px sans-serif';
        g.textAlign='center';
        g.fillText(c.name,sx+sw/2-fs(0.005),py+fs(0.1));
        g.textAlign='left';
      });
    }

    // AI 추천
    var ay2=cardy+fs(0.38);
    g.fillStyle='#2B2A33'; g.font='bold '+fs(0.03)+'px sans-serif';
    g.fillText('AI 추천 코디', fs(0.08), ay2);
    g.fillStyle='#736C72'; g.font='400 '+fs(0.027)+'px sans-serif';
    var outfit=bd.outfit||'';
    if(outfit.length>60) outfit=outfit.substring(0,60)+'…';
    wrapTextCanvas(g,outfit,fs(0.08),ay2+fs(0.036),W*0.84,fs(0.038));

    // 하단 해시태그
    g.fillStyle='rgba(255,255,255,0.88)';
    g.fillRect(0,H-fs(0.1),W,fs(0.1));
    g.fillStyle=pal.from; g.font='bold '+fs(0.028)+'px sans-serif';
    g.textAlign='center';
    g.fillText('#GraceAI  #이미지브랜딩  #퍼스널컬러  #4050품격', W/2, H-fs(0.03));
    g.textAlign='left';

    try{
      resolve({dataUrl:cv.toDataURL('image/jpeg',0.88), name:'grace-ai-report.jpg'});
    }catch(e){
      var cv2=document.createElement('canvas'); cv2.width=2; cv2.height=2;
      resolve({dataUrl:cv2.toDataURL(), name:'grace-ai-report.png'});
    }
  });
}function setCat(idx){
  state.quickSet=idx;
  renderMain(); scrollChat();
}

var _shareOverlay=null;

function closeShareSheet(){
  if(_shareOverlay){
    var el=_shareOverlay;
    _shareOverlay=null;
    // 즉시 pointer-events 차단 해제 → 아래 버튼 즉시 클릭 가능
    el.style.pointerEvents='none';
    el.style.opacity='0';
    el.style.transition='opacity .2s';
    setTimeout(function(){
      if(el.parentNode) el.parentNode.removeChild(el);
    },220);
  }
}

function openApp(scheme,fallbackUrl){
  var isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isMobile){
    var t=Date.now();
    setTimeout(function(){ if(Date.now()-t<1800) window.open(fallbackUrl,'_blank'); },1200);
    try{ window.location.href=scheme; }catch(e){ window.open(fallbackUrl,'_blank'); }
  } else { window.open(fallbackUrl,'_blank'); }
}

function _legacyCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); showToast('텍스트를 복사했어요! 📋\n앱에 붙여넣기 하세요.'); }
  catch(e){ showToast('직접 텍스트를 선택해서 복사해주세요.'); }
  document.body.removeChild(ta);
}

function copyToClipboard(text){

function showToast(msg){
  var t=document.getElementById('graceToast');
  if(!t){t=document.createElement('div');t.id='graceToast';
    t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(0);background:#2B2A33;color:#fff;padding:13px 22px;border-radius:16px;font-size:.88rem;line-height:1.55;text-align:center;z-index:9999;max-width:300px;box-shadow:0 6px 28px rgba(0,0,0,.35);white-space:pre-line;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);

function _buildSys(){

  }
}

function _buildGeminiContents(){
  var BAD=['연결이 원활','응답을 받지','인터넷 연결','응답이 너무','HTTP ','empty','오류'];
  var out=[];
  state.chatHistory.forEach(function(m){
    if(m.role!=='user'&&m.role!=='assistant') return;
    if(!m.content||!m.content.trim()) return;
    var bad=false; BAD.forEach(function(b){ if(m.content.indexOf(b)>=0) bad=true; });
    if(bad) return;
    var role=m.role==='assistant'?'model':'user';
    if(out.length&&out[out.length-1].role===role) return;
    out.push({role:role, parts:[{text:m.content.trim()}]});
  });
  return out;
}

async function callGemini(){
  var contents=_buildGeminiContents();
  if(!contents.length||contents[contents.length-1].role!=='user') return null;

  var sys=_buildSys();
  var body={
    systemInstruction:{parts:[{text:sys}]},
    contents:contents,
    generationConfig:{maxOutputTokens:1000,temperature:0.8}
  };

  var res;
  try{
    res=await fetch(GEMINI_ENDPOINT+GEMINI_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
  }catch(e){
    throw new Error('네트워크 연결 실패. 잠시 후 다시 시도해 주세요.');
  }

  var text='';
  try{ text=await res.text(); }catch(e){ throw new Error('응답 읽기 실패'); }

  if(!res.ok){
    var code=res.status;
    if(code===429) throw new Error('요청이 너무 많아요. 잠시 후 다시 시도해 주세요.');
    if(code>=500) throw new Error('서버 오류. 잠시 후 다시 시도해 주세요.');
    throw new Error('HTTP '+code);
  }

  var data;
  try{ data=JSON.parse(text); }catch(e){ throw new Error('응답 형식 오류'); }
  if(data.candidates&&data.candidates[0]&&data.candidates[0].content&&
     data.candidates[0].content.parts&&data.candidates[0].content.parts[0]){
    return data.candidates[0].content.parts[0].text;
  }
  if(data.error) throw new Error(data.error.message||'API 오류');
  throw new Error('빈 응답');
}

async function sendMessage(text){
  var inp=document.getElementById('chatInput');
  var msg=(text||(inp&&inp.value)||'').trim();
  if(!msg||state.isTyping) return;
  if(inp){ inp.value=''; inp.style.height='auto'; }

  /* 직전 에러 메시지 제거 */
  while(state.chatHistory.length){
    var last=state.chatHistory[state.chatHistory.length-1];
    if(last.role==='assistant'&&(
      last.content.indexOf('연결')>=0||last.content.indexOf('오류')>=0||
      last.content.indexOf('시도')>=0||last.content.indexOf('HTTP')>=0
    )){ state.chatHistory.pop(); } else break;
  }

  state.chatHistory.push({role:'user',content:msg});
  state.isTyping=true;
  renderMain(); scrollChat();

  var reply=null, errMsg=null;
  try{ reply=await callGemini(); }
  catch(e){ console.error('[GraceAI]',e.message); errMsg=e.message; }

  if(reply){
    state.chatHistory.push({role:'assistant',content:reply});
  } else if(errMsg){
    state.chatHistory.push({role:'assistant',content:errMsg});
  } else {
    state.chatHistory.pop();
    state.chatHistory.push({role:'assistant',content:'죄송해요, 응답을 받지 못했어요. 다시 질문해 주세요.'});
  }
  state.isTyping=false; state.quickSet++;
  renderMain(); scrollChat();
}


var recognition=null;
function initSTT(){
  var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec)return;
  recognition=new SpeechRec();
  recognition.lang='ko-KR'; recognition.continuous=false; recognition.interimResults=true;
  recognition.onresult=function(e){
    var transcript='';
    for(var i=e.resultIndex;i<e.results.length;i++)transcript+=e.results[i][0].transcript;
    var inp=document.getElementById('chatInput');
    if(inp)inp.value=transcript;
    if(e.results[e.results.length-1].isFinal){stopSTT();sendMessage();}
  };
  recognition.onerror=function(){stopSTT();};
  recognition.onend=function(){if(state.sttActive)stopSTT();};

function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseMarkdown(str){
  // 마크다운 → HTML 변환 (굵게, 기울임, 줄바꿈, 불릿)
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^[-•] (.+)$/gm,'<span style="display:block;padding-left:1em;text-indent:-1em;">• $1</span>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

/* ═══════════════════ DATE · TIME · WEATHER CONTEXT ═══════════════════ */
var ctx = {
  dateStr:'', timeStr:'', timePeriod:'', calSeason:'',
  weatherDesc:'', weatherTemp:'', weatherIcon:'',
  loaded:false
};

function initContext(){
  var now = new Date();
  var month = now.getMonth()+1;
  var hour  = now.getHours();

  // Date
  ctx.dateStr = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  ctx.timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // Time period
  if(hour>=5&&hour<9)       ctx.timePeriod='이른 아침';
  else if(hour>=9&&hour<12) ctx.timePeriod='오전';
  else if(hour>=12&&hour<14)ctx.timePeriod='점심';
  else if(hour>=14&&hour<18)ctx.timePeriod='오후';
  else if(hour>=18&&hour<21)ctx.timePeriod='저녁';
  else                       ctx.timePeriod='밤';

  // Calendar season (Korea)
  if(month>=3&&month<=5)       ctx.calSeason='봄 🌸';
  else if(month>=6&&month<=8)  ctx.calSeason='여름 ☀️';
  else if(month>=9&&month<=11) ctx.calSeason='가을 🍂';
  else                          ctx.calSeason='겨울 ❄️';

  // Fetch weather via Open-Meteo (free, no key)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat=pos.coords.latitude.toFixed(4);
      var lon=pos.coords.longitude.toFixed(4);
      fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
        +'&current=temperature_2m,weathercode&timezone=auto')
      .then(function(r){return r.json();})
      .then(function(d){
        var temp = Math.round(d.current.temperature_2m);
        var code = d.current.weathercode;
        ctx.weatherTemp = temp+'°C';
        ctx.weatherDesc = wmoDesc(code);
        ctx.weatherIcon = wmoIcon(code);
        ctx.loaded = true;
        // refresh topbar if in main phase
        if(state.phase==='main') renderWeatherBar();
      })
      .catch(function(){ ctx.loaded=true; });
    }, function(){ ctx.loaded=true; });
  } else {
    ctx.loaded = true;
  }
}

function wmoDesc(code){
  if(code===0)return '맑음';
  if(code<=2) return '구름 조금';
  if(code<=3) return '흐림';
  if(code<=49)return '안개';
  if(code<=59)return '이슬비';
  if(code<=69)return '비';
  if(code<=79)return '눈';
  if(code<=82)return '소나기';
  if(code<=99)return '뇌우';
  return '흐림';
}
function wmoIcon(code){
  if(code===0)return '☀️';
  if(code<=2) return '⛅';
  if(code<=3) return '☁️';
  if(code<=49)return '🌫️';
  if(code<=69)return '🌧️';
  if(code<=79)return '❄️';
  if(code<=82)return '🌦️';
  return '⛈️';
}

function renderWeatherBar(){
  var bar = document.getElementById('weatherBar');
  if(!bar) return;
  var weatherPart = ctx.weatherTemp
    ? ctx.weatherIcon+' '+ctx.weatherDesc+' '+ctx.weatherTemp+' · '
    : '';
  bar.textContent = weatherPart + ctx.calSeason + ' · ' + ctx.timePeriod + ' · ' + ctx.timeStr;
}

function weatherBarHTML(){
  var weatherPart = ctx.weatherTemp
    ? ctx.weatherIcon+' '+ctx.weatherDesc+' '+ctx.weatherTemp+' · '
    : '';
  var text = weatherPart + ctx.calSeason + ' · ' + ctx.timePeriod + ' · ' + ctx.timeStr;
  return '<div id="weatherBar" style="'+
    'font-size:.74rem;font-weight:700;color:var(--gold-deep);'+
    'background:var(--gold-bg);border-radius:999px;'+
    'padding:5px 14px;display:inline-flex;align-items:center;gap:4px;'+
    'letter-spacing:.01em;margin-bottom:12px;">'+text+'</div>';
}

function ctxSummary(){
  try{
    var season=(ctx.calSeason||'').replace(/[\uD800-\uDFFF]|[\u2600-\u2764]/g,'').replace(/\s+/g,' ').trim();
    var w=ctx.weatherTemp?'날씨 '+ctx.weatherDesc+' '+ctx.weatherTemp+',':'';
    return (season||'현재')+'계절, '+w+' '+(ctx.timePeriod||'')+ ', '+(ctx.dateStr||'');
  }catch(e){ return '현재 계절'; }
}

      var cpText=url;
      if(navigator.clipboard){
        navigator.clipboard.writeText(cpText).then(function(){btn.textContent='✓ 복사됨!';setTimeout(function(){btn.textContent='URL 복사';},2000);});
      } else {
        var ta=document.createElement('textarea'); ta.value=cpText;
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.textContent='✓ 복사됨!'; setTimeout(function(){btn.textContent='URL 복사';},2000);
      }
    };
  },60);
}
function closeQR(){
  if(_qrOverlay){
    _qrOverlay.style.opacity='0'; _qrOverlay.style.transition='opacity .18s';
    setTimeout(function(){ if(_qrOverlay&&_qrOverlay.parentNode) _qrOverlay.parentNode.removeChild(_qrOverlay); _qrOverlay=null; },200);
  }
}

document.getElementById('backBtn').addEventListener('click',goBack);
// QR 버튼 - addEventListener로 안정적 바인딩
var qrFabEl=document.getElementById('qrFab');
if(qrFabEl) qrFabEl.addEventListener('click',function(e){ e.stopPropagation(); showQR(); });
initSTT();
initContext();

/* 모바일 키보드 대응 - 채팅 입력창 키보드 위로 올리기 */
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',function(){
    var bar=document.getElementById('chatInputBar');
    if(!bar||state.tab!=='chatbot') return;
    var offset=Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
    bar.style.transform = offset>50 ? 'translateY(-'+Math.min(offset,320)+'px)' : '';
    bar.style.transition = 'transform .12s ease';
    var msgs=document.getElementById('chatMessages');
    if(msgs) setTimeout(function(){msgs.scrollTop=msgs.scrollHeight;},80);
  });
  window.visualViewport.addEventListener('scroll',function(){
    var bar=document.getElementById('chatInputBar');
    if(bar) bar.style.transform='';
  });
}

/* 스크롤 복원 방지 */
if('scrollRestoration' in history) history.scrollRestoration='manual';

renderDiag();

window.GraceApp={
  goNext:goNext, goBack:goBack, restart:restart, switchTab:switchTab,
  selectGender:selectGender, selectBody:selectBody, answerColor:answerColor,
  toggleCoach:toggleCoach, sendQuick:sendQuick,
  setCat:setCat, shareChatMsg:shareChatMsg,
  shareReport:shareReport,
  copyReport:function(){ copyToClipboard(buildShareText()); },
  shareKakao:shareKakao, shareInsta:shareInsta,
  showQR:showQR, closeQR:closeQR
};
})();
</script>
